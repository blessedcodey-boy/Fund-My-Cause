name: Gas Cost Monitoring

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gas-monitoring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build contracts
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Run gas cost monitoring
        run: ./scripts/monitor-gas.sh ${{ github.event_name == 'pull_request' && '--compare-base' || '' }}

      - name: Upload gas reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gas-reports
          path: target/gas-reports/
          retention-days: 30

      - name: Comment PR with gas analysis
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const reportsDir = 'target/gas-reports';
            if (!fs.existsSync(reportsDir)) {
              console.log('No gas reports found');
              return;
            }
            
            const files = fs.readdirSync(reportsDir);
            const recommendations = files.find(f => f.includes('optimization'));
            
            if (recommendations) {
              const content = fs.readFileSync(path.join(reportsDir, recommendations), 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ⛽ Gas Cost Analysis\n\n${content}`
              });
            }
