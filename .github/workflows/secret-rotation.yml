name: Secret Rotation

on:
  schedule:
    # Run every 90 days (approximately every 13 weeks)
    # Cron: 0 2 1 * * = 2 AM UTC on the 1st of every month
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rotation regardless of last rotation time'
        required: false
        default: 'false'

jobs:
  rotate-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Run secret rotation check
        run: |
          ./scripts/rotate-secrets.sh ${{ github.event.inputs.force == 'true' && '--force' || '' }}

      - name: Alert on rotation
        if: success()
        run: |
          echo "::notice title=Secret Rotation::Secrets have been rotated. Verify all services are using updated credentials."

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error title=Secret Rotation Failed::Secret rotation check failed. Review logs and take manual action if needed."
